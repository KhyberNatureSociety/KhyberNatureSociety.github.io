<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#071710" />
            <stop offset="50%" stop-color="#0E291C" />
            <stop offset="100%" stop-color="#0A1E14" />
        </linearGradient>

        <!-- DNA Glowing Gradient -->
        <linearGradient id="dnaGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#E5A93B" stop-opacity="0.9" />
        </linearGradient>
        <linearGradient id="dnaGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8CA17C" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#163E2B" stop-opacity="0.8" />
        </linearGradient>

        <!-- Leaf Gradient -->
        <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2D5D46" />
            <stop offset="100%" stop-color="#8CA17C" />
        </linearGradient>

        <!-- Beaker Glow -->
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFD700" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#FFD700" stop-opacity="0" />
        </radialGradient>
        
        <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#8CA17C" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#8CA17C" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="800" height="600" rx="16" fill="url(#bgGrad)" />

    <!-- Tech Grid Overlay -->
    <g stroke="rgba(140, 161, 124, 0.05)" stroke-width="1">
        <!-- Horizontal lines -->
        <line x1="0" y1="100" x2="800" y2="100" />
        <line x1="0" y1="200" x2="800" y2="200" />
        <line x1="0" y1="300" x2="800" y2="300" />
        <line x1="0" y1="400" x2="800" y2="400" />
        <line x1="0" y1="500" x2="800" y2="500" />
        <!-- Vertical lines -->
        <line x1="100" y1="0" x2="100" y2="600" />
        <line x1="200" y1="0" x2="200" y2="600" />
        <line x1="300" y1="0" x2="300" y2="600" />
        <line x1="400" y1="0" x2="400" y2="600" />
        <line x1="500" y1="0" x2="500" y2="600" />
        <line x1="600" y1="0" x2="600" y2="600" />
        <line x1="700" y1="0" x2="700" y2="600" />
    </g>

    <!-- Glowing Background Blobs -->
    <circle cx="400" cy="300" r="250" fill="url(#greenGlow)" />
    <circle cx="280" cy="220" r="150" fill="url(#glow)" />

    <!-- Abstract Hexagon Network -->
    <g stroke="rgba(140, 161, 124, 0.08)" stroke-width="1.5" fill="none">
        <polygon points="120,150 170,120 220,150 220,210 170,240 120,210" />
        <polygon points="220,150 270,120 320,150 320,210 270,240 220,210" />
        <polygon points="170,240 220,210 220,210 270,240 270,300 220,330 170,300" />
        
        <polygon points="580,390 630,360 680,390 680,450 630,480 580,450" />
        <polygon points="480,450 530,420 580,450 580,510 530,540 480,510" />
    </g>

    <!-- DNA Double Helix (Diagonal across the screen) -->
    <g transform="translate(100, -50) rotate(15)">
        <!-- DNA back bone connectors -->
        <g stroke="rgba(229, 169, 59, 0.3)" stroke-width="2">
            <line x1="150" y1="180" x2="150" y2="300" />
            <line x1="210" y1="190" x2="210" y2="290" />
            <line x1="270" y1="210" x2="270" y2="270" />
            <line x1="330" y1="240" x2="330" y2="240" />
            <line x1="390" y1="270" x2="390" y2="210" />
            <line x1="450" y1="290" x2="450" y2="190" />
            <line x1="510" y1="300" x2="510" y2="180" />
            <line x1="570" y1="290" x2="570" y2="190" />
            <line x1="630" y1="270" x2="630" y2="210" />
            <line x1="690" y1="240" x2="690" y2="240" />
            <line x1="750" y1="200" x2="750" y2="280" />
        </g>
        
        <!-- DNA Strand 1 (Sine Wave) -->
        <path d="M 90 170 Q 150 140 210 190 T 330 240 T 450 290 T 570 290 T 690 240 T 810 180" fill="none" stroke="url(#dnaGrad1)" stroke-width="5" stroke-linecap="round" filter="drop-shadow(0px 0px 8px rgba(229,169,59,0.5))" />

        <!-- DNA Strand 2 (Cosine Wave) -->
        <path d="M 90 310 Q 150 340 210 290 T 330 240 T 450 190 T 570 190 T 690 240 T 810 300" fill="none" stroke="url(#dnaGrad2)" stroke-width="4" stroke-linecap="round" />

        <!-- Nodes on Strand 1 -->
        <g fill="#FFD700" filter="drop-shadow(0px 0px 5px #FFD700)">
            <circle cx="150" cy="180" r="7" />
            <circle cx="210" cy="190" r="7" />
            <circle cx="270" cy="210" r="7" />
            <circle cx="330" cy="240" r="7" />
            <circle cx="390" cy="270" r="7" />
            <circle cx="450" cy="290" r="7" />
            <circle cx="510" cy="300" r="7" />
            <circle cx="570" cy="290" r="7" />
            <circle cx="630" cy="270" r="7" />
            <circle cx="690" cy="240" r="7" />
            <circle cx="750" cy="200" r="7" />
        </g>

        <!-- Nodes on Strand 2 -->
        <g fill="#8CA17C">
            <circle cx="150" cy="300" r="5" />
            <circle cx="210" cy="290" r="5" />
            <circle cx="270" cy="270" r="5" />
            <circle cx="330" cy="240" r="5" />
            <circle cx="390" cy="210" r="5" />
            <circle cx="450" cy="190" r="5" />
            <circle cx="510" cy="180" r="5" />
            <circle cx="570" cy="190" r="5" />
            <circle cx="630" cy="210" r="5" />
            <circle cx="690" cy="240" r="5" />
            <circle cx="750" cy="280" r="5" />
        </g>
    </g>

    <!-- Lab Flask & Preservation Unit (Focus Point) -->
    <g transform="translate(180, 200)">
        <!-- Cryo chamber background base -->
        <rect x="180" y="240" width="80" height="20" rx="6" fill="#163E2B" stroke="#8CA17C" stroke-width="2" />
        
        <!-- Flask Body -->
        <path d="M 200 130 
                 L 200 90 
                 L 190 90 
                 L 190 70 
                 L 250 70 
                 L 250 90 
                 L 240 90 
                 L 240 130 
                 A 70 70 0 0 1 290 190
                 L 290 230
                 A 10 10 0 0 1 280 240
                 L 160 240
                 A 10 10 0 0 1 150 230
                 L 150 190
                 A 70 70 0 0 1 200 130 Z" 
              fill="rgba(140, 161, 124, 0.1)" 
              stroke="#8CA17C" 
              stroke-width="3" 
              stroke-linejoin="round" />

        <!-- Liquid Level -->
        <path d="M 153 200 
                 Q 180 205 220 200 
                 T 287 200
                 L 287 230
                 A 7 7 0 0 1 280 237
                 L 160 237
                 A 7 7 0 0 1 153 230 Z" 
              fill="rgba(22, 62, 43, 0.6)" 
              stroke="none" />

        <!-- Floating Seedling/Leaf (Preserved Biodiversity) -->
        <g transform="translate(200, 135)">
            <!-- Stem -->
            <path d="M 20 60 Q 20 30 25 10" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
            <!-- Left Leaf -->
            <path d="M 20 40 C 0 35 -5 15 15 15 C 20 25 20 35 20 40 Z" fill="url(#leafGrad)" stroke="#8CA17C" stroke-width="1.5" />
            <!-- Right Leaf -->
            <path d="M 23 28 C 40 25 45 5 25 8 C 22 18 22 25 23 28 Z" fill="url(#leafGrad)" stroke="#8CA17C" stroke-width="1.5" />
            <!-- Top Bud -->
            <path d="M 25 10 C 20 -2 30 -2 25 10 Z" fill="#FFD700" />
            
            <!-- Glowing bubbles in the preservation liquid -->
            <circle cx="5" cy="50" r="3" fill="#FFD700" opacity="0.8" />
            <circle cx="35" cy="58" r="2" fill="#8CA17C" opacity="0.6" />
            <circle cx="12" cy="30" r="4" fill="#FFD700" opacity="0.5" />
            <circle cx="28" cy="45" r="2" fill="#8CA17C" opacity="0.7" />
        </g>

        <!-- Digital Registry Interface Lines (Futuristic overlay) -->
        <g stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.8">
            <!-- Measurement marks on beaker -->
            <line x1="230" y1="120" x2="238" y2="120" />
            <line x1="230" y1="140" x2="242" y2="140" />
            <line x1="230" y1="160" x2="238" y2="160" />
            <line x1="230" y1="180" x2="245" y2="180" />
            <line x1="230" y1="200" x2="238" y2="200" />
            <line x1="230" y1="220" x2="242" y2="220" />
            
            <!-- Scanning target graphic -->
            <path d="M 125 150 L 125 130 L 145 130" />
            <path d="M 315 150 L 315 130 L 295 130" />
            <path d="M 125 210 L 125 230 L 145 230" />
            <path d="M 315 210 L 315 230 L 295 230" />
        </g>
        
        <!-- Science Data Label overlay -->
        <rect x="290" y="80" width="80" height="30" rx="4" fill="rgba(14, 41, 28, 0.8)" stroke="#8CA17C" stroke-width="1" />
        <text x="300" y="98" fill="#8CA17C" font-family="monospace" font-size="10" font-weight="bold">GEN-B v1.0</text>
        <line x1="250" y1="85" x2="290" y2="95" stroke="#FFD700" stroke-width="1" stroke-dasharray="3,3" />
    </g>

    <!-- Lab Flask Base stand shadows -->
    <ellipse cx="400" cy="460" rx="90" ry="10" fill="rgba(7,23,16,0.5)" />

    <!-- Corner Decorative Elements / Tech Stats -->
    <g fill="none" stroke="rgba(140, 161, 124, 0.2)" stroke-width="1">
        <!-- Target Reticle Top Left -->
        <circle cx="50" cy="50" r="15" />
        <line x1="50" y1="30" x2="50" y2="70" />
        <line x1="30" y1="50" x2="70" y2="50" />
        
        <!-- Tech border accents -->
        <path d="M 20 80 L 20 20 L 80 20" stroke-width="2" stroke="#8CA17C" />
        <path d="M 780 80 L 780 20 L 720 20" stroke-width="2" stroke="#8CA17C" />
        <path d="M 20 520 L 20 580 L 80 580" stroke-width="2" stroke="#8CA17C" />
        <path d="M 780 520 L 780 580 L 720 580" stroke-width="2" stroke="#8CA17C" />
    </g>

    <!-- Title / Content Branding -->
    <g font-family="sans-serif">
        <text x="50" y="520" fill="#FFFFFF" font-size="18" font-weight="bold" letter-spacing="1">BIODIVERSITY GENE BANK</text>
        <text x="50" y="545" fill="#8CA17C" font-size="12" letter-spacing="0.5">Molecular Research &amp; Sample Preservation</text>
        <text x="50" y="565" fill="#E5A93B" font-size="10" font-family="monospace">SECURE COLD-STORAGE ARCHIVE // KP - PAKISTAN</text>
    </g>
</svg>
